system: "base24"
name: "Everforest Soft"
variant: "light"
palette:
  base00: "#F3EAD3" # Background        │ Default Background
  base01: "#EAE4CA" # Darkest Gray      │ Lighter Background (Used for status bars)
  base02: "#E5DFC5" # Dark Gray         │ Selection Background
  base03: "#DDD8BE" # Light Black/Gray  │ Comments, Invisibles, Line Highlighting
  base04: "#D8D3BA" # Light Gray        │ Dark Foreground (Used for status bars)
  base05: "#B9C0AB" # White             │ Default Foreground, Caret, Delimiters, Operators
  base06: "#A6B0A0" # Lighter White     │ Light Foreground (Not often used)
  base07: "#939F91" # Bright White      │ The Lightest Foreground (Not often used)
  base08: "#F85552" # Red               │ Variables, XML Tags, Markup Link Text, Markup Lists, Diff Deleted
  base09: "#F57D26" # Orange            │ Integers, Boolean, Constants, XML Attributes, Markup Link Url
  base0A: "#DFA000" # Yellow            │ Classes, Markup Bold, Search Text Background
  base0B: "#8DA101" # Green             │ Strings, Inherited Class, Markup Code, Diff Inserted
  base0C: "#35A77C" # Cyan              │ Support, Regular Expressions, Escape Characters, Markup Quotes
  base0D: "#3A94C5" # Blue              │ Functions, Methods, Attribute IDs, Headings
  base0E: "#DF69BA" # Magenta           │ Keywords, Storage, Selector, Markup Italic, Diff Changed
  base0F: "#E66868" # Dark Red or Brown │ Deprecated Highlighting for Methods and Functions, Opening/Closing Embedded Language Tags, e.g., <?php ?>
  base10: "#708089" # Darker Black      │ Darker Background
  base11: "#5C6A72" # Darkest Black     │ The Darkest Background
  base12: "#FADBD0" # Light Red
  base13: "#F1E4C5" # Light Yellow
  base14: "#E5E6C5" # Light Green
  base15: "#E1E4BD" # Light Cyan
  base16: "#E1E7DD" # Light Blue
  base17: "#F1DDD4" # Light Magenta
