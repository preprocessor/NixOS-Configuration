system: "base24"
name: "Kanagawa Dragon"
author: "Stefan Weigl-Bosker (https://github.com/sweiglbosker), Tommaso Laurenzi (https://github.com/rebelot/kanagawa.nvim)"
variant: "dark"
palette:
  base00: "#181616" # Background. Default Background
  base01: "#282727" # Black. Lighter Background(Used for status bars)
  base02: "#393836" # Bright Black. Selection Background
  base03: "#625e5a" # Comments, Invisibles, Line Highlighting.
  base04: "#737c73" # Dark Foreground (Used for status bars).
  base05: "#c5c9c5" # Foreground. Default Foreground, Caret, Delimiters, Operators
  base06: "#c8c093" # White. Light Foreground (Not often used)
  base07: "#c5c9c5" # Bright White. Lightest Foreground (Not often used)
  base08: "#c4746e" # Red. Variables, XML Tags, Markup Link Text, Markup Lists, Diff Deleted
  base09: "#b6927b" # Yellow. Integers, Boolean, Constants, XML Attributes, Markup Link Url
  base0A: "#c4b28a" # Classes, Markup Bold, Search Text Background.
  base0B: "#8a9a7b" # Green. Strings, Inherited Class, Markup Code, Diff Inserted
  base0C: "#8ea4a2" # Cyan. Support, Regular Expressions, Escape Characters, Markup Quotes
  base0D: "#8ba4b0" # Blue. Functions, Methods, Attribute IDs, Headings
  base0E: "#a292a3" # Purple. Keywords, Storage, Selector, Markup Italic, Diff Changed
  base0F: "#b98d7b" # Deprecated.
  base10: "#12120f" # Darker Background.
  base11: "#0d0c0c" # Darkest Background.
  base12: "#e46876" # Bright Red.
  base13: "#e6c384" # Bright Yellow.
  base14: "#87a987" # Bright Green.
  base15: "#7aa89f" # Bright Cyan.
  base16: "#7fb4ca" # Bright Blue.
  base17: "#938aa9" # Bright Purple.
